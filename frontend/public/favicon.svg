<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="65" rx="28" ry="22" fill="#5a6a7a"/>
  <!-- Head -->
  <ellipse cx="50" cy="38" rx="20" ry="18" fill="#5a6a7a"/>
  <!-- Face highlight -->
  <ellipse cx="50" cy="42" rx="13" ry="10" fill="#8a9aaa"/>
  <!-- Left eye -->
  <circle cx="43" cy="35" r="4" fill="white"/>
  <circle cx="44" cy="35" r="2.5" fill="#1a1a2e"/>
  <circle cx="45" cy="34" r="0.8" fill="white"/>
  <!-- Right eye -->
  <circle cx="57" cy="35" r="4" fill="white"/>
  <circle cx="58" cy="35" r="2.5" fill="#1a1a2e"/>
  <circle cx="59" cy="34" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="44" rx="4" ry="2.5" fill="#3a3a4a"/>
  <!-- Mouth -->
  <path d="M 45 47 Q 50 51 55 47" stroke="#3a3a4a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="36" y1="44" x2="46" y2="45" stroke="#ccc" stroke-width="1" stroke-linecap="round"/>
  <line x1="35" y1="47" x2="46" y2="47" stroke="#ccc" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="64" y1="44" x2="54" y2="45" stroke="#ccc" stroke-width="1" stroke-linecap="round"/>
  <line x1="65" y1="47" x2="54" y2="47" stroke="#ccc" stroke-width="1" stroke-linecap="round"/>
  <!-- Left flipper -->
  <ellipse cx="24" cy="70" rx="10" ry="6" fill="#4a5a6a" transform="rotate(-30 24 70)"/>
  <!-- Right flipper -->
  <ellipse cx="76" cy="70" rx="10" ry="6" fill="#4a5a6a" transform="rotate(30 76 70)"/>
  <!-- Tail flippers -->
  <ellipse cx="41" cy="84" rx="10" ry="5" fill="#4a5a6a" transform="rotate(-20 41 84)"/>
  <ellipse cx="59" cy="84" rx="10" ry="5" fill="#4a5a6a" transform="rotate(20 59 84)"/>
</svg>
